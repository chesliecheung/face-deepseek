<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek AI 对话助手</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #a855f7;
      --background: #0f1117;
      --surface: #1a1d28;
      --surface-light: #232633;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --border: #334155;
      --user-msg: #4f46e5;
      --ai-msg: #2d334c;
      --shadow: rgba(0, 0, 0, 0.25);
    }
    
    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--background);
      display: flex;
      height: 100vh;
      overflow: hidden;
      color: var(--text-primary);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(28, 30, 60, 0.4) 0%, transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(39, 41, 70, 0.4) 0%, transparent 25%);
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-dark);
    }

    /* 左侧导航栏样式 */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 10;
      box-shadow: 2px 0 10px var(--shadow);
    }

    .sidebar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .sidebar-header {
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(26, 29, 40, 0.9);
    }

    .sidebar-header::before {
      content: '🧠';
      font-size: 24px;
    }

    .new-chat-btn {
      margin: 15px;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .new-chat-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .new-chat-btn:active {
      transform: translateY(0);
    }

    .history-section {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }

    .history-title {
      padding: 10px 20px;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .clear-history {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 12px;
      transition: color 0.2s;
    }

    .clear-history:hover {
      color: var(--error);
    }

    .history-list {
      list-style: none;
    }

    .history-item {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      border-left: 3px solid transparent;
      transition: all 0.2s ease;
      margin: 2px 8px;
      border-radius: 8px;
    }

    .history-item:hover {
      background: var(--surface-light);
    }

    .history-item.active {
      background: linear-gradient(90deg, rgba(79, 70, 229, 0.15), transparent);
      border-left-color: var(--primary);
    }

    .history-content {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .history-item.active .history-content {
      color: var(--text-primary);
      font-weight: 500;
    }

    .history-delete {
      color: var(--text-muted);
      padding: 5px;
      border-radius: 4px;
      opacity: 0;
      transition: all 0.2s;
    }

    .history-item:hover .history-delete {
      opacity: 1;
    }

    .history-delete:hover {
      color: var(--error);
      background: rgba(239, 68, 68, 0.1);
    }

    .footer {
      padding: 15px;
      border-top: 1px solid var(--border);
      background: rgba(26, 29, 40, 0.9);
    }

    .footer-option {
      display: flex;
      align-items: center;
      padding: 10px;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 8px;
    }

    .footer-option:hover {
      background: var(--surface-light);
      color: var(--primary);
    }

    .footer-option i {
      margin-right: 10px;
      width: 20px;
      text-align: center;
    }

    .footer-note {
      color: var(--text-muted);
      font-size: 12px;
      padding: 10px 0;
      text-align: center;
    }

    /* 主聊天区域样式 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .main-content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 75% 25%, rgba(39, 41, 70, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 25% 75%, rgba(28, 30, 60, 0.3) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .main-header {
      background: rgba(26, 29, 40, 0.8);
      backdrop-filter: blur(10px);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 10px var(--shadow);
      position: relative;
      z-index: 5;
    }

    .main-title {
      font-size: 18px;
      font-weight: bold;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .main-title::before {
      content: '🤖';
    }

    .user-menu {
      position: relative;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      cursor: pointer;
      border: 2px solid var(--surface-light);
      box-shadow: 0 4px 8px var(--shadow);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .user-avatar::before {
      content: '用';
    }

    .user-avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 12px var(--shadow);
    }

    .dropdown-menu {
      position: absolute;
      top: 50px;
      right: 0;
      background: var(--surface-light);
      border-radius: 12px;
      box-shadow: 0 10px 25px var(--shadow);
      width: 200px;
      z-index: 100;
      display: none;
      overflow: hidden;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .dropdown-menu.show {
      display: block;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dropdown-item {
      padding: 12px 15px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-secondary);
      text-decoration: none;
    }

    .dropdown-item i {
      margin-right: 10px;
      color: var(--text-muted);
      width: 18px;
      text-align: center;
    }

    .dropdown-item:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
    }

    .dropdown-item:hover i {
      color: var(--primary);
    }

    .dropdown-divider {
      height: 1px;
      background: var(--border);
      margin: 5px 0;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      animation: messageAppear 0.3s ease;
    }

    @keyframes messageAppear {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message {
      max-width: 70%;
      padding: 15px 20px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 15px;
      word-wrap: break-word;
      box-shadow: 0 4px 12px var(--shadow);
      position: relative;
    }

    .user-row {
      justify-content: flex-end;
    }

    .user {
      background: linear-gradient(135deg, var(--user-msg), #4338ca);
      color: white;
      border-bottom-right-radius: 5px;
    }

    .ai {
      background: var(--ai-msg);
      color: var(--text-primary);
      border-bottom-left-radius: 5px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      box-shadow: 0 4px 8px var(--shadow);
    }

    .avatar-user {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }

    .avatar-user::before {
      content: '用';
    }

    .avatar-ai {
      background: linear-gradient(135deg, var(--secondary), #7e22ce);
    }

    .avatar-ai::before {
      content: 'AI';
    }

    #input-area {
      display: flex;
      padding: 20px;
      background: rgba(26, 29, 40, 0.8);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 5;
    }

    #input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 15px 20px;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px var(--shadow);
      background: var(--surface-light);
      color: var(--text-primary);
    }

    #input:focus {
      border-color: var(--primary);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    #input::placeholder {
      color: var(--text-muted);
    }

    #send-btn {
      margin-left: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      color: white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 15px var(--shadow);
    }

    #send-btn:hover {
      transform: translateY(-2px) rotate(5deg);
      box-shadow: 0 8px 20px var(--shadow);
    }

    #send-btn:active {
      transform: translateY(0);
    }

    #send-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* AI markdown 样式 */
    .ai h1, .ai h2, .ai h3 {
      margin: 10px 0;
      font-weight: bold;
      color: var(--text-primary);
    }
    
    .ai h1 {
      border-bottom: 1px solid var(--border);
      padding-bottom: 5px;
    }
    
    .ai pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0;
      border: 1px solid var(--border);
    }
    
    .ai code {
      font-family: Consolas, Monaco, "Courier New", monospace;
      background: rgba(0, 0, 0, 0.2);
      padding: 2px 5px;
      border-radius: 4px;
      color: var(--text-primary);
    }
    
    .ai ul, .ai ol {
      padding-left: 25px;
      margin: 10px 0;
    }
    
    .ai li {
      margin: 5px 0;
    }
    
    .ai blockquote {
      border-left: 4px solid var(--primary);
      padding-left: 15px;
      color: var(--text-secondary);
      margin: 12px 0;
      font-style: italic;
    }
    
    .ai table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0;
    }
    
    .ai th, .ai td {
      border: 1px solid var(--border);
      padding: 8px;
      text-align: left;
    }
    
    .ai th {
      background: rgba(0, 0, 0, 0.2);
    }

    /* 加载动画 */
    .loading-dots {
      display: flex;
      gap: 5px;
      padding: 5px 0;
    }
    
    .loading-dots span {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1s infinite;
    }
    
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    
    /* 时间戳 */
    .timestamp {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      margin: 10px 0;
      position: relative;
    }
    
    .timestamp::before {
      content: '';
      position: absolute;
      left: 20%;
      right: 20%;
      top: 50%;
      height: 1px;
      background: var(--border);
      z-index: -1;
    }
    
    .timestamp span {
      background: var(--surface);
      padding: 0 10px;
    }
    
    /* 错误消息 */
    .error-message {
      color: var(--error);
      text-align: center;
      padding: 10px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 8px;
      margin: 10px 0;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    
    /* API设置面板 */
    .api-settings {
      background: var(--surface);
      border-radius: 12px;
      padding: 20px;
      margin: 15px;
      box-shadow: 0 5px 20px var(--shadow);
      border: 1px solid var(--border);
    }
    
    .api-settings h3 {
      margin-bottom: 15px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .api-settings h3::before {
      content: '⚙️';
    }
    
    .api-input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 15px;
      background: var(--surface-light);
      color: var(--text-primary);
      font-size: 14px;
    }
    
    .api-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .api-test {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .api-test:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px var(--shadow);
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        left: -280px;
        height: 100%;
        z-index: 100;
        transition: 0.3s;
      }
      
      .sidebar.show {
        left: 0;
        box-shadow: 5px 0 15px var(--shadow);
      }
      
      .menu-toggle {
        display: block;
        position: absolute;
        left: 15px;
        font-size: 20px;
        cursor: pointer;
        z-index: 101;
        background: var(--primary);
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px var(--shadow);
      }
      
      .message {
        max-width: 85%;
      }
    }
    
    /* 添加一些动画效果 */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
    
    .pulse {
      animation: pulse 2s infinite;
    }
  </style>
</head>
<body>
<!-- 左侧导航栏 -->
<div class="sidebar">
  <div class="sidebar-header">DeepSeek</div>
  <button class="new-chat-btn">
    <i class="fas fa-plus"></i> 开启新对话
  </button>
  
  <div class="history-section">
    <div class="history-title">
      <span>对话历史</span>
      <span class="clear-history" title="清除历史记录">清除</span>
    </div>
    <ul class="history-list" id="history-list">
      <!-- 历史记录将通过JavaScript动态添加 -->
    </ul>
  </div>
  
  <div class="footer">
    <div class="footer-option">
      <i class="fas fa-compass"></i>
      <span>浏览更多</span>
    </div>
    <div class="footer-option">
      <i class="fas fa-wifi"></i>
      <span>[联网搜索]</span>
    </div>
    <div class="footer-option">
      <i class="fas fa-user"></i>
      <span>个人信息</span>
    </div>
    <div class="footer-note">
      DeepSeek AI · 由深度求索提供支持
    </div>
  </div>
</div>

<!-- 主聊天区域 -->
<div class="main-content">
  <div class="main-header">
    <div class="main-title">DeepSeek AI 对话助手</div>
    <div class="user-menu">
      <div class="user-avatar" id="user-avatar"></div>
      <div class="dropdown-menu" id="dropdown-menu">
        <div class="dropdown-item">
          <i class="fas fa-user"></i>
          <span>个人资料</span>
        </div>
        <div class="dropdown-item">
          <i class="fas fa-cog"></i>
          <span>设置</span>
        </div>
        <div class="dropdown-divider"></div>
        <a href="https://www.deepseek.com" class="dropdown-item" id="logout-btn">
          <i class="fas fa-sign-out-alt"></i>
          <span>退出登录</span>
        </a>
      </div>
    </div>
  </div>

  <div id="chat-container">
    <div class="timestamp"><span>今天</span></div>
    <div class="message-row ai-row">
      <div class="avatar avatar-ai"></div>
      <div class="message ai">
        我是 DeepSeek，很高兴见到你！我可以帮你写代码、读文件、写作各种创意内容，请把你的任务交给我吧~
      </div>
    </div>
  </div>

  <div id="input-area">
    <input id="input" type="text" placeholder="输入你的问题..." />
    <button id="send-btn">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>
</div>

<!-- API设置面板（默认隐藏） -->
<div class="api-settings" id="api-settings" style="display: none;">
  <h3>API设置</h3>
  <input type="text" class="api-input" id="api-url" placeholder="API端点URL" value="http://localhost:9999/user-info/chats">
  <button class="api-test" id="api-test">测试连接</button>
</div>

<!-- 引入 marked.js 和 highlight.js -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
  // DOM元素
  const chatContainer = document.getElementById('chat-container');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const historyList = document.getElementById('history-list');
  const clearHistoryBtn = document.querySelector('.clear-history');
  const newChatBtn = document.querySelector('.new-chat-btn');
  const userAvatar = document.getElementById('user-avatar');
  const dropdownMenu = document.getElementById('dropdown-menu');
  const apiSettings = document.getElementById('api-settings');
  const apiUrlInput = document.getElementById('api-url');
  const apiTestBtn = document.getElementById('api-test');
  const logoutBtn = document.getElementById('logout-btn');

  // API配置
  let apiEndpoint = localStorage.getItem('apiEndpoint') || "http://localhost:9999/user-info/chats";
  apiUrlInput.value = apiEndpoint;

  // 初始化历史记录
  let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];
  let currentChatId = null;
  let isWaitingForResponse = false;

  // 初始化页面
  function initPage() {
    renderHistoryList();
    // 如果有历史记录，显示最后一条
    if (chatHistory.length > 0) {
      loadChat(chatHistory[chatHistory.length - 1].id);
    }
  }

  // 渲染历史记录列表
  function renderHistoryList() {
    historyList.innerHTML = '';
    
    if (chatHistory.length === 0) {
      historyList.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-muted);">暂无对话历史</div>';
      return;
    }
    
    // 按日期分组
    const groupedHistory = groupHistoryByDate(chatHistory);
    
    // 渲染分组后的历史记录
    for (const [date, items] of Object.entries(groupedHistory)) {
      const dateTitle = document.createElement('div');
      dateTitle.className = 'history-title';
      dateTitle.textContent = date;
      historyList.appendChild(dateTitle);
      
      items.forEach(item => {
        const li = document.createElement('li');
        li.className = `history-item ${currentChatId === item.id ? 'active' : ''}`;
        li.setAttribute('data-id', item.id);
        
        li.innerHTML = `
          <div class="history-content">${item.title}</div>
          <div class="history-delete" data-id="${item.id}">
            <i class="fas fa-times"></i>
          </div>
        `;
        
        li.addEventListener('click', (e) => {
          if (!e.target.classList.contains('history-delete') && 
              !e.target.parentElement.classList.contains('history-delete')) {
            loadChat(item.id);
          }
        });
        
        const deleteBtn = li.querySelector('.history-delete');
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteChat(item.id);
        });
        
        historyList.appendChild(li);
      });
    }
  }

  // 按日期分组历史记录
  function groupHistoryByDate(history) {
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    
    const groups = {};
    
    history.forEach(item => {
      const itemDate = new Date(item.timestamp);
      let dateKey;
      
      if (isSameDay(itemDate, today)) {
        dateKey = '今天';
      } else if (isSameDay(itemDate, yesterday)) {
        dateKey = '昨天';
      } else {
        dateKey = formatDate(itemDate);
      }
      
      if (!groups[dateKey]) {
        groups[dateKey] = [];
      }
      
      groups[dateKey].push(item);
    });
    
    return groups;
  }

  // 判断两个日期是否是同一天
  function isSameDay(date1, date2) {
    return date1.getFullYear() === date2.getFullYear() &&
           date1.getMonth() === date2.getMonth() &&
           date1.getDate() === date2.getDate();
  }

  // 格式化日期
  function formatDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  // 保存聊天记录到本地存储
  function saveChatHistory() {
    localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
    renderHistoryList();
  }

  // 创建新聊天
  function createNewChat() {
    currentChatId = null;
    chatContainer.innerHTML = `
      <div class="timestamp"><span>今天</span></div>
      <div class="message-row ai-row">
        <div class="avatar avatar-ai"></div>
        <div class="message ai">
          我是 DeepSeek，很高兴见到你！我可以帮你写代码、读文件、写作各种创意内容，请把你的任务交给我吧~
        </div>
      </div>
    `;
    
    // 移除所有历史项目的active类
    document.querySelectorAll('.history-item').forEach(item => {
      item.classList.remove('active');
    });
  }

  // 加载聊天
  function loadChat(chatId) {
    const chat = chatHistory.find(c => c.id === chatId);
    if (!chat) return;
    
    currentChatId = chatId;
    chatContainer.innerHTML = '';
    
    // 添加时间戳
    const timestampDiv = document.createElement('div');
    timestampDiv.className = 'timestamp';
    const span = document.createElement('span');
    span.textContent = formatDate(new Date(chat.timestamp));
    timestampDiv.appendChild(span);
    chatContainer.appendChild(timestampDiv);
    
    chat.messages.forEach(msg => {
      addMessageToChat(msg.text, msg.sender, false);
    });
    
    // 更新active状态
    document.querySelectorAll('.history-item').forEach(item => {
      if (item.getAttribute('data-id') === chatId) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });
  }

  // 删除聊天
  function deleteChat(chatId) {
    chatHistory = chatHistory.filter(c => c.id !== chatId);
    if (currentChatId === chatId) {
      createNewChat();
    }
    saveChatHistory();
  }

  // 清除所有历史记录
  function clearAllHistory() {
    if (confirm('确定要清除所有对话历史吗？此操作不可恢复。')) {
      chatHistory = [];
      localStorage.removeItem('chatHistory');
      createNewChat();
      renderHistoryList();
    }
  }

  // 添加消息到聊天界面
  function addMessageToChat(text, sender, isLoading = false) {
    const row = document.createElement('div');
    row.classList.add('message-row', sender === 'user' ? 'user-row' : 'ai-row');

    const avatar = document.createElement('div');
    avatar.classList.add('avatar', sender === 'user' ? 'avatar-user' : 'avatar-ai');

    const msg = document.createElement('div');
    msg.classList.add('message', sender);

    if (isLoading) {
      msg.innerHTML = `
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>`;
    } else {
      if (sender === 'ai') {
        msg.innerHTML = marked.parse(text); // 渲染 Markdown
        msg.querySelectorAll('pre code').forEach((block) => {
          hljs.highlightElement(block); // 代码高亮
        });
      } else {
        msg.innerText = text;
      }
    }

    if (sender === 'user') {
      row.appendChild(msg);
      row.appendChild(avatar);
    } else {
      row.appendChild(avatar);
      row.appendChild(msg);
    }

    chatContainer.appendChild(row);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    return msg; // 返回 message div，方便替换内容
  }

  // 显示错误消息
  function showError(message) {
    const errorDiv = document.createElement('div');
    errorDiv.className = 'error-message';
    errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
    chatContainer.appendChild(errorDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  // 测试API连接
  async function testApiConnection() {
    try {
      const response = await fetch(apiUrlInput.value, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify("测试连接")
      });
      
      if (response.ok) {
        alert("API连接成功！");
        apiEndpoint = apiUrlInput.value;
        localStorage.setItem('apiEndpoint', apiEndpoint);
        apiSettings.style.display = 'none';
      } else {
        alert("API连接失败，请检查URL和服务器状态");
      }
    } catch (error) {
      alert("API连接错误: " + error.message);
    }
  }

  // 发送消息
  async function sendMessage() {
    if (isWaitingForResponse) return;
    
    const text = input.value.trim();
    if (!text) return;

    // 添加用户消息
    addMessageToChat(text, 'user');
    input.value = '';

    // 如果没有当前聊天，创建一个
    if (!currentChatId) {
      const newChat = {
        id: Date.now().toString(),
        title: text.length > 20 ? text.substring(0, 20) + '...' : text,
        timestamp: Date.now(),
        messages: [{ text, sender: 'user' }]
      };
      chatHistory.push(newChat);
      currentChatId = newChat.id;
      saveChatHistory();
    } else {
      // 添加到现有聊天
      const chat = chatHistory.find(c => c.id === currentChatId);
      if (chat) {
        chat.messages.push({ text, sender: 'user' });
        saveChatHistory();
      }
    }

    // 添加AI加载动画
    const loadingMsg = addMessageToChat('', 'ai', true);
    isWaitingForResponse = true;
    sendBtn.disabled = true;

    try {
      const response = await fetch(apiEndpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(text)
      });

      if (!response.ok) {
        throw new Error(`服务器错误: ${response.status}`);
      }

      const data = await response.json();
      let aiReply = data.message?.content || data.content || data.reply || "（未返回有效内容）";

      // 过滤掉 <think>...</think>
      aiReply = aiReply.replace(/<think>[\s\S]*?<\/think>/g, '').trim();

      // 替换 loading 为真正内容（Markdown渲染）
      loadingMsg.innerHTML = marked.parse(aiReply);
      loadingMsg.querySelectorAll('pre code').forEach((block) => {
        hljs.highlightElement(block);
      });
      
      // 保存AI响应到历史记录
      const chat = chatHistory.find(c => c.id === currentChatId);
      if (chat) {
        chat.messages.push({ text: aiReply, sender: 'ai' });
        saveChatHistory();
      }
    } catch (error) {
      console.error("API请求错误:", error);
      loadingMsg.innerHTML = "";
      showError(`请求出错: ${error.message}. 请检查API设置或网络连接。`);
      
      // 添加API设置提示
      const settingsTip = document.createElement('div');
      settingsTip.className = 'message ai';
      settingsTip.innerHTML = `
        <p>您可以点击右上角用户头像，选择"设置"来配置API端点。</p>
        <p>当前API端点: <code>${apiEndpoint}</code></p>
      `;
      chatContainer.appendChild(settingsTip);
    } finally {
      isWaitingForResponse = false;
      sendBtn.disabled = false;
    }
  }

  // 退出登录功能
  function logout() {
    // 清除本地存储数据
    localStorage.removeItem('chatHistory');
    localStorage.removeItem('apiEndpoint');
    
    // 这里可以添加其他清理逻辑，比如清除cookies等
    
    // 显示退出提示
    alert('您已成功退出登录');
    
    // 跳转到指定页面 - 这里以DeepSeek官网为例
    // 在实际应用中，您可能需要跳转到登录页面或其他页面
    window.location.href = 'index.html';
  }

  // 初始化事件监听
  function initEventListeners() {
    // 发送消息
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !isWaitingForResponse) sendMessage();
    });
    
    // 用户菜单
    userAvatar.addEventListener('click', () => {
      dropdownMenu.classList.toggle('show');
    });
    
    // 点击其他地方关闭菜单
    document.addEventListener('click', (e) => {
      if (!userAvatar.contains(e.target) && !dropdownMenu.contains(e.target)) {
        dropdownMenu.classList.remove('show');
      }
    });
    
    // 新聊天按钮
    newChatBtn.addEventListener('click', createNewChat);
    
    // 清除历史记录
    clearHistoryBtn.addEventListener('click', clearAllHistory);
    
    // 退出登录
    logoutBtn.addEventListener('click', (e) => {
      e.preventDefault(); // 阻止默认链接行为
      if (confirm('确定要退出登录吗？')) {
        logout();
      }
    });
    
    // 设置选项
    document.querySelectorAll('.dropdown-item').forEach(item => {
      if (item.textContent.includes('设置')) {
        item.addEventListener('click', () => {
          apiSettings.style.display = apiSettings.style.display === 'none' ? 'block' : 'none';
          dropdownMenu.classList.remove('show');
        });
      }
    });
    
    // API测试按钮
    apiTestBtn.addEventListener('click', testApiConnection);
  }

  // 页面加载完成后初始化
  document.addEventListener('DOMContentLoaded', () => {
    initPage();
    initEventListeners();
  });
</script>
</body>
