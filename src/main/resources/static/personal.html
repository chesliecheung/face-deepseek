<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人中心 - 智慧博客</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    function renderDefaultAvatar(el, name) {
      const firstChar = name.charAt(0) || "我";
      $(el).css({
        "background": getRandomColor(),
        "color": "white",
        "display": "flex",
        "alignItems": "center",
        "justifyContent": "center"
      }).attr("src", "").text(firstChar);
    }

    function getRandomColor() {
      const colors = ["#818cf8", "#52c41a", "#faad14", "#f5222d"];
      return colors[Math.floor(Math.random() * colors.length)];
    }
  </script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --secondary: #1e293b;
      --accent: #ec4899;
      --light: #f8fafc;
      --dark: #0f172a;
      --gray: #64748b;
      --gray-light: #94a3b8;
      --border: #334155;
      --transition: all 0.3s ease;
      --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      --navbar-height: 60px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)),
      url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-1.2.1&auto=format&fit=crop&w=2000&q=80') no-repeat center center fixed;
      background-size: cover;
      color: var(--light);
      line-height: 1.6;
      min-height: 100vh;
      padding-top: var(--navbar-height);
    }

    /* 顶部导航 */
    .header {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: var(--navbar-height);
    }
    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 100%;
    }
    .logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--light);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo i { color: var(--primary-light); }
    .nav-menu { display: flex; list-style: none; gap: 30px; }
    .nav-menu a {
      text-decoration: none;
      color: var(--gray-light);
      font-weight: 500;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-menu a:hover {
      color: var(--primary-light);
      transform: translateY(-1px);
    }
    .user-info { display: flex; align-items: center; gap: 15px; }
    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      transition: var(--transition);
    }
    .header-avatar:hover {
      border-color: var(--primary-light);
      transform: scale(1.05);
    }
    .logout-btn {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--light);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(5px);
    }
    .logout-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    /* 主容器 */
    .main-container {
      max-width: 1280px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 30px;
    }
    @media (max-width: 768px) {
      .main-container { grid-template-columns: 1fr; }
    }

    /* 侧边栏 */
    .sidebar {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--card-shadow);
      height: fit-content;
      position: relative;
    }
    .sidebar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(to right, var(--primary), var(--accent));
      opacity: 0.8;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    /* 个人资料卡片 */
    .profile-card {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 10px;
    }
    .profile-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 18px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      display: block;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 38px;
      font-weight: bold;
      text-align: center;
      line-height: 110px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      transition: var(--transition);
    }
    .profile-avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    .profile-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--light);
    }
    .profile-stats {
      display: flex;
      justify-content: space-around;
      padding: 18px 0;
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary-light);
    }
    .stat-label {
      font-size: 13px;
      color: var(--gray-light);
      margin-top: 4px;
    }

    /* 菜单列表 */
    .menu-list {
      list-style: none;
      margin-top: 15px;
    }
    .menu-item {
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--gray-light);
      font-size: 15px;
    }
    .menu-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--primary-light);
      transform: translateX(3px);
    }
    .menu-item.active {
      background: rgba(99, 102, 241, 0.2);
      color: var(--primary-light);
      font-weight: 600;
    }
    .menu-item i { width: 20px; text-align: center; }

    /* 内容区域 */
    .content-area {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--card-shadow);
      position: relative;
    }
    .content-area::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(to right, var(--primary), var(--accent));
      opacity: 0.8;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    /* 内容头部 */
    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 10px;
    }
    .content-title {
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--light);
    }
    .content-title i { color: var(--primary-light); }
    .header-actions { display: flex; gap: 12px; }
    .home-btn {
      background: rgba(82, 196, 26, 0.2);
      border: 1px solid rgba(82, 196, 26, 0.3);
      color: #73d13d;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    .home-btn:hover {
      background: rgba(82, 196, 26, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(82, 196, 26, 0.2);
    }
    .write-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
    }
    .write-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(99, 102, 241, 0.3);
    }

    /* 文章列表 */
    .article-list { display: flex; flex-direction: column; gap: 20px; }
    .article-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px;
      transition: var(--transition);
    }
    .article-card:hover {
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.08);
    }
    .article-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }
    .article-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--light);
      transition: var(--transition);
      cursor: pointer;
      line-height: 1.4;
    }
    .article-title:hover {
      color: var(--primary-light);
      text-decoration: underline;
      text-underline-offset: 4px;
    }
    .article-status {
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(5px);
    }
    .status-published {
      background: rgba(82, 196, 26, 0.2);
      color: #73d13d;
      border: 1px solid rgba(82, 196, 26, 0.3);
    }
    .status-draft {
      background: rgba(250, 173, 20, 0.2);
      color: #ffc53d;
      border: 1px solid rgba(250, 173, 20, 0.3);
    }
    .article-meta {
      color: var(--gray-light);
      font-size: 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .article-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .article-summary {
      color: var(--gray-light);
      font-size: 15px;
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .article-stats {
      display: flex;
      gap: 25px;
      margin-bottom: 18px;
      color: var(--gray-light);
      font-size: 14px;
    }
    .article-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition);
    }
    .article-stat:hover {
      color: var(--primary-light);
    }
    .article-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .action-btn {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--gray-light);
    }
    .action-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--light);
    }
    .delete-btn {
      background: rgba(245, 34, 45, 0.15);
      border-color: rgba(245, 34, 45, 0.2);
      color: #ff4d4f;
    }
    .delete-btn:hover {
      background: rgba(245, 34, 45, 0.25);
      box-shadow: 0 4px 10px rgba(245, 34, 45, 0.15);
      color: #ff7875;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--gray-light);
      font-size: 15px;
    }
    .loading i {
      font-size: 32px;
      margin-bottom: 15px;
      color: var(--primary-light);
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--gray-light);
    }
    .empty-state i {
      font-size: 56px;
      margin-bottom: 20px;
      color: var(--primary-light);
      opacity: 0.5;
    }
    .empty-state p {
      font-size: 16px;
      margin-bottom: 25px;
    }

    /* 吐司提示 */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 14px 22px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      z-index: 9999;
      display: none;
      color: var(--light);
      font-size: 15px;
    }
    .toast.success {
      border-left: 4px solid #52c41a;
    }
    .toast.error {
      border-left: 4px solid #f5222d;
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.8);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-dark);
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 30px 0;
      margin-top: 60px;
      color: var(--gray-light);
      font-size: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
<header class="header">
  <div class="nav-container">
    <div class="logo"><i class="fas fa-brain"></i> 智慧博客</div>
    <nav>
      <ul class="nav-menu">
        <li><a href="home.html"><i class="fas fa-home"></i> 首页</a></li>
        <li><a href="discover.html"><i class="fas fa-compass"></i> 发现</a></li>
        <li><a href="topics.html"><i class="fas fa-comments"></i> 话题</a></li>
      </ul>
    </nav>
    <div class="user-info">
      <img id="headerAvatar" class="header-avatar" src="" alt="我的头像" onerror="renderDefaultAvatar(this, $('#headerUserName').text() || '我')">
      <span id="headerUserName">加载中...</span>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
    </div>
  </div>
</header>

<div class="main-container">
  <aside class="sidebar">
    <div class="profile-card">
      <img id="profileAvatar" class="profile-avatar" src="" alt="用户头像" onerror="renderDefaultAvatar(this, $('#profileUserName').text() || '我')">
      <h3 id="profileUserName" class="profile-name">加载中...</h3>
      <div class="profile-stats">
        <div class="stat-item">
          <div id="articleCount" class="stat-value">0</div>
          <div class="stat-label">文章</div>
        </div>
        <div class="stat-item">
          <div id="followerCount" class="stat-value">0</div>
          <div class="stat-label">粉丝</div>
        </div>
      </div>
    </div>

    <ul class="menu-list">
      <li class="menu-item active"><i class="fas fa-user"></i> 个人中心</li>
      <li class="menu-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-file-alt"></i> 数据看板</li>
      <li class="menu-item" onclick="window.location.href='my-comments.html'"><i class="fas fa-comment-dots"></i> 我的评论</li>
      <li class="menu-item" onclick="window.location.href='follow-manage.html'"><i class="fas fa-user-friends"></i> 关注管理</li>
      <li class="menu-item" onclick="window.location.href='settings.html'"><i class="fas fa-cog"></i> 账号设置</li>
    </ul>
  </aside>

  <main class="content-area">
    <div class="content-header">
      <h2 class="content-title"><i class="fas fa-file-alt"></i> 我的文章</h2>
      <div class="header-actions">
        <button class="home-btn" onclick="window.location.href='home.html'"><i class="fas fa-home"></i> 返回主页</button>
        <button class="write-btn" onclick="window.location.href='write.html'"><i class="fas fa-pen"></i> 写新文章</button>
      </div>
    </div>

    <div id="articleList" class="article-list">
      <div class="loading">
        <i class="fas fa-spinner"></i>
        <p>加载我的文章中...</p>
      </div>
    </div>
  </main>
</div>

<footer class="footer">
  <p>© 2023 智慧博客平台 · 探索技术的无限可能</p>
  <p>背景图片来自 Unsplash，设计灵感来源于现代UI设计理念</p>
</footer>

<div id="toast" class="toast">
  <span id="toastMsg">操作提示</span>
</div>

<script>
  const baseUrl = "http://localhost:9999";
  const defaultAvatar = `${baseUrl}/uploads/default-avatar.png`;
  const loginPage = "login.html";
  let loginUser = null;
  let userId = 0;

  $(document).ready(function() {
    getUserInfo()
            .then(() => {
              userId = loginUser.id;
              renderProfileInfo();
              getMyArticles();
              getFollowerCount();
              getArticleCount();
            })
            .catch((err) => {
              showToast(err, "error");
              setTimeout(() => {
                window.location.href = loginPage;
              }, 3000);
            });
  });

  function getUserInfo() {
    return new Promise((resolve, reject) => {
      $.ajax({
        url: `${baseUrl}/user/info`,
        type: "GET",
        xhrFields: { withCredentials: true },
        success: (res) => {
          if (res.success && res.data) {
            loginUser = res.data;
            console.log("后端返回的avatarUrl:", loginUser.avatarUrl);
            resolve();
          } else {
            reject(res.msg || "获取用户信息失败");
          }
        },
        error: () => {
          reject("网络异常，无法获取用户信息");
        }
      });
    });
  }

  function getMyArticles() {
    $.ajax({
      url: `${baseUrl}/article/my`,
      type: "GET",
      xhrFields: { withCredentials: true },
      success: (res) => {
        if (res.success && res.data.length > 0) {
          renderArticleList(res.data);
        } else {
          $("#articleList").html(`
            <div class="empty-state">
              <i class="fas fa-file-alt"></i>
              <p>你还没有发布任何文章</p>
              <button class="write-btn" onclick="window.location.href='write.html'"><i class="fas fa-pen"></i> 立即创作</button>
            </div>
          `);
        }
      },
      error: () => {
        $("#articleList").html(`
          <div class="loading">
            <i class="fas fa-exclamation-circle"></i>
            <p>文章加载失败，请刷新重试</p>
          </div>
        `);
      }
    });
  }

  function deleteArticle(articleId) {
    if (!confirm("确定删除这篇文章吗？删除后不可恢复！")) {
      return;
    }
    $.ajax({
      url: `${baseUrl}/article/delete`,
      type: "POST",
      data: { articleId },
      xhrFields: { withCredentials: true },
      success: (res) => {
        if (res.success) {
          showToast("文章删除成功", "success");
          getMyArticles();
        } else {
          showToast(res.msg || "删除失败", "error");
        }
      },
      error: () => {
        showToast("网络异常，删除失败", "error");
      }
    });
  }

  function getLikeCount(articleId, callback) {
    $.ajax({
      url: `${baseUrl}/like/count`,
      type: "GET",
      data: { articleId },
      xhrFields: { withCredentials: true },
      success: (res) => {
        if (res.success) {
          callback(res.data);
        } else {
          callback(0);
        }
      },
      error: () => {
        callback(0);
      }
    });
  }

  function getCommentCount(articleId, callback) {
    $.ajax({
      url: `${baseUrl}/comment/list`,
      type: "GET",
      data: { articleId },
      xhrFields: { withCredentials: true },
      success: (res) => {
        if (res.success) {
          callback(res.data.length);
        } else {
          callback(0);
        }
      },
      error: () => {
        callback(0);
      }
    });
  }

  function getFollowerCount() {
    $.ajax({
      url: `${baseUrl}/user/followerCount`,
      type: "GET",
      xhrFields: { withCredentials: true },
      success: (res) => {
        if (res.success) {
          $("#followerCount").text(res.data);
        }
      },
      error: () => {
        $("#followerCount").text("未知");
      }
    });
  }

  function getArticleCount() {
    $.ajax({
      url: `${baseUrl}/article/my`,
      type: "GET",
      xhrFields: { withCredentials: true },
      success: (res) => {
        if (res.success) {
          $("#articleCount").text(res.data.length);
        }
      },
      error: () => {
        $("#articleCount").text("未知");
      }
    });
  }

  function renderProfileInfo() {
    const username = (loginUser.username || "未知用户").trim();
    $("#headerUserName").text(username);
    $("#profileUserName").text(username);

    let avatarUrl = loginUser.avatarUrl || "";
    avatarUrl = avatarUrl.trim();

    const isAbsoluteUrl = avatarUrl.toLowerCase().startsWith("http");
    let finalAvatarUrl;
    if (isAbsoluteUrl) {
      finalAvatarUrl = avatarUrl;
    } else if (avatarUrl) {
      finalAvatarUrl = `${baseUrl}/${avatarUrl.replace(/^\/+/, "")}`;
    } else {
      finalAvatarUrl = defaultAvatar;
    }

    console.log("最终头像URL：", finalAvatarUrl);

    $("#headerAvatar")
            .attr("src", finalAvatarUrl)
            .on("error", function() {
              renderDefaultAvatar(this, username);
              console.error("顶栏头像加载失败，URL：", finalAvatarUrl);
            });

    const $profileAvatar = $("#profileAvatar");
    $profileAvatar
            .attr("src", finalAvatarUrl)
            .css({
              "background": "transparent",
              "overflow": "hidden"
            })
            .on("error", function() {
              renderDefaultAvatar(this, username);
              console.error("左侧头像加载失败，URL：", finalAvatarUrl);
            });
  }

  function renderArticleList(articles) {
    let html = "";
    articles.forEach(article => {
      const publishTime = article.publishTime ?
              formatDateTime(article.publishTime) :
              formatDateTime(article.updateTime);

      const statusCls = article.status === "published" ? "status-published" : "status-draft";
      const statusText = article.status === "published" ? "已发布" : "草稿";

      const articleId = article.id;
      html += `
        <div class="article-card" data-id="${articleId}">
          <div class="article-header">
            <h3 class="article-title" onclick="goToArticleDetail(${articleId})">${article.title}</h3>
            <span class="article-status ${statusCls}">${statusText}</span>
          </div>
          <div class="article-meta">
            <span><i class="fas fa-calendar-alt"></i> ${publishTime}</span>
            <span><i class="fas fa-tags"></i> ${article.tags?.length || 0} 个标签</span>
          </div>
          <p class="article-summary">${article.summary || "无摘要"}</p>
          <div class="article-stats">
            <span class="article-stat like-count" data-id="${articleId}">
              <i class="fas fa-heart"></i> <span>加载中...</span>
            </span>
            <span class="article-stat comment-count" data-id="${articleId}">
              <i class="fas fa-comment"></i> <span>加载中...</span>
            </span>
          </div>
          <div class="article-actions">
            <button class="action-btn delete-btn" onclick="deleteArticle(${articleId})">
              <i class="fas fa-trash"></i> 删除
            </button>
          </div>
        </div>
      `;
    });
    $("#articleList").html(html);

    articles.forEach(article => {
      const articleId = article.id;

      getLikeCount(articleId, (count) => {
        $(`.like-count[data-id="${articleId}"] span`).text(count);
      });

      getCommentCount(articleId, (count) => {
        $(`.comment-count[data-id="${articleId}"] span`).text(count);
      });
    });
  }

  function logout() {
    if (!confirm("确定要退出登录吗？")) {
      return;
    }
    $.ajax({
      url: `${baseUrl}/user/logout`,
      type: "POST",
      xhrFields: { withCredentials: true },
      success: (res) => {
        if (res.success) {
          window.location.href = loginPage;
        } else {
          showToast(res.msg || "退出失败", "error");
        }
      },
      error: () => {
        showToast("网络异常，退出失败", "error");
      }
    });
  }

  function formatDateTime(dateStr) {
    if (!dateStr) return "未知时间";
    return dateStr.replace("T", " ").split(".")[0];
  }

  function showToast(msg, type = "success") {
    const $toast = $("#toast");
    const $toastMsg = $("#toastMsg");
    $toastMsg.text(msg);
    $toast.removeClass("success error").addClass(type);
    $toast.fadeIn();
    setTimeout(() => {
      $toast.fadeOut();
    }, 3000);
  }

  function goToArticleDetail(articleId) {
    window.location.href = `detail.html?id=${articleId}`;
  }
</script>
</body>
</html>
